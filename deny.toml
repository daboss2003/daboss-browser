[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # paste 1.0.15 is unmaintained (not vulnerable). Pulled in transitively by
    # boa_engine through boa_ast/boa_string. boa is the only pure-Rust JS engine
    # we can use, so we accept the dep until boa's maintainers migrate to
    # pastey or with_builtin_macros.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    # Mozilla's bundled CA cert list (webpki-roots) ships as data under this license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
